name: publish-package

on:
  release:
    types: [published, prereleased]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write      # Required for tokenless npm Trusted Publishing
      packages: write      # Required to write to GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      
      - name: install
        run: npm install
        if: ${{ always() }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_PACKAGES_TOKEN }}

      - name: build package
        run: npm run build:src

      - name: Setup Node for npm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org' # Points to public npm

      - name: publish package
        working-directory: ./lib
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ] || [ "${{ github.event.release.prerelease }}" = true ]; then
            echo "Pre-release detected. Publishing to npm with tag..."
            npm publish --access public --tag next --provenance
          else
            echo "Stable release detected. Publishing to npm normally..."
            npm publish --access public --provenance
          fi
        if: ${{ always() }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com' # Overwrites registry path to GitHub
          scope: '@stamcat' # Binds the package structure explicitly to your GitHub scope

      - name: publish GitHub package
        working-directory: ./lib
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ] || [ "${{ github.event.release.prerelease }}" = true ]; then
            echo "Pre-release detected. Publishing to GitHub Packages with tag..."
            npm publish --tag next
          else
            echo "Stable release detected. Publishing to GitHub Packages normally..."
            npm publish
          fi 
        if: ${{ always() }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_PACKAGES_TOKEN }}
