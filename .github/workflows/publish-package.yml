name: publish-package

on:
  release:
    types: [published, prereleased]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect prerelease
        id: meta
        run: echo "prerelease=${{ github.event.release.prerelease }}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:src

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            lib/
            package.json
            README.md
            LICENSE
            CHANGELOG.md

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: |
          cd lib
          if [ "${{ needs.build.outputs.prerelease }}" = "true" ]; then
            echo "Publishing prerelease to npm with tag 'next'"
            npm publish --access public --tag next --provenance
          else
            echo "Publishing stable release to npm"
            npm publish --access public --provenance
          fi
          
  publish-github:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@stamcat'

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_GITHUB_PACKAGES_TOKEN }}
        run: |
          cd lib
          if [ "${{ needs.build.outputs.prerelease }}" = "true" ]; then
            echo "Publishing prerelease to GitHub Packages with tag 'next'"
            npm publish --tag next
          else
            echo "Publishing stable release to GitHub Packages"
            npm publish
          fi
